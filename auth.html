<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Fairteamsbuilder - Anmeldung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16a34a" />
    <link rel="stylesheet" href="./theme.css" />
    <style>
      header {
        background: #ffffff !important;
        color: #111827 !important;
        border-bottom: 1px solid var(--border);
        padding: 14px 20px 0;
        min-height: 112px;
        box-sizing: border-box;
        display: block;
        position: relative;
        overflow: hidden;
      }

      header::before {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background: url('./img/Logo_fair.png') left 0 top 8px / auto calc(100% - 10px) no-repeat;
        opacity: 0.36;
        pointer-events: none;
      }

      header > * {
        position: relative;
        z-index: 1;
      }

      .header-tabs {
        position: absolute;
        left: 20px;
        bottom: -1px;
        z-index: 1;
        display: flex;
        gap: 0.35rem;
        align-items: flex-end;
        flex-wrap: wrap;
      }

      .header-tab {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        padding: 0.38rem 0.75rem;
        border: 1px solid #7dd3fc;
        background: #e0f2fe;
        color: #000000;
        border-top-left-radius: 0.65rem;
        border-top-right-radius: 0.65rem;
        border-bottom-left-radius: 0.2rem;
        border-bottom-right-radius: 0.2rem;
        font-size: 0.78rem;
        font-weight: 600;
      }

      .header-tab.active {
        background: #bae6fd;
      }

      .header-tab:hover {
        background: #7dd3fc;
      }

      .page {
        margin: 0;
        padding: 1rem 20px;
      }

      .auth-card {
        width: min(460px, 100%);
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 0.65rem;
        padding: 1rem;
      }

      .auth-fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(180px, 1fr));
        gap: 0.5rem;
      }

      .auth-actions {
        margin-top: 0.5rem;
        display: flex;
        gap: 0.4rem;
              }

      .auth-status {
        margin-top: 0.35rem;
        font-size: 0.85rem;
      }

      @media (max-width: 720px) {
        header {
          min-height: 88px;
          padding: 10px 12px 0;
        }

        header::before {
          background-size: auto calc(100% - 8px);
          opacity: 0.30;
        }

        .header-tabs {
          position: absolute;
          left: 12px;
          right: 12px;
          bottom: -1px;
          width: auto;
        }

        .auth-fields {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="header-tabs" aria-label="Bereich wechseln">
        <a class="header-tab" href="./index.html">Builder</a>
        <a class="header-tab" href="./pool-manager.html">Verwaltung</a>
        <a class="header-tab active" href="./auth.html"><span id="authTabLabel">Anmeldung</span></a>
      </nav>
    </header>

    <main class="page">
      <section class="auth-card">
        <div class="auth-fields">
          <div>
            <label for="authEmail">Benutzername</label>
            <input id="authEmail" type="text" placeholder="z.B. trainer01" autocomplete="username" />
          </div>
          <div>
            <label for="authPassword">Passwort</label>
            <input id="authPassword" type="password" autocomplete="current-password" />
          </div>
        </div>

        <div class="auth-actions">
          <button id="signInBtn" class="secondary small">Anmelden</button>
          <button id="signUpBtn" class="ghost small">Registrieren</button>
          <button id="signOutBtn" class="danger small" disabled>Abmelden</button>
        </div>

        <div id="authUserLabel" class="auth-status">Nicht angemeldet.</div>
        <div id="authStatus" class="auth-status"></div>
        <div id="syncStatus" class="auth-status">Nicht verbunden</div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.local.js"></script>
    <script src="./supabase-config.js"></script>
    <script src="./js/auth-cloud.js"></script>
  </body>
</html>
