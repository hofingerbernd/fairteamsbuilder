<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>Fairteamsbuilder - Pools verwalten</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ec4899" />
    <link rel="stylesheet" href="./theme.css" />
    <style>
      header {
        background: #ffffff !important;
        color: #111827 !important;
        border-bottom: 1px solid var(--border);
        padding: 14px 20px 0;
        min-height: 112px;
        box-sizing: border-box;
        display: block;
        position: relative;
        overflow: hidden;
      }

      header::before {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        background: url('./img/logo_fair1.png') left 0 bottom / 880px auto no-repeat;
        opacity: 0.16;
        pointer-events: none;
      }

      header > * {
        position: relative;
        z-index: 1;
      }

      .header-tabs {
        position: absolute;
        left: 20px;
        bottom: -1px;
        z-index: 1;
        display: flex;
        gap: 0.35rem;
        align-items: flex-end;
        flex-wrap: wrap;
      }

      .header-tab {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        padding: 0.56rem 1.05rem;
        border: 1px solid #7dd3fc;
        background: #e0f2fe;
        color: #000000;
        border-top-left-radius: 0.65rem;
        border-top-right-radius: 0.65rem;
        border-bottom-left-radius: 0.2rem;
        border-bottom-right-radius: 0.2rem;
        font-size: 0.96rem;
        font-weight: 600;
      }

      .header-tab.active {
        background: #bae6fd;
      }

      .header-tab:hover {
        background: #7dd3fc;
      }

      .auth-tab-wrap {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
      }

      .header-auth {
        width: min(360px, 100%);
        border: 1px solid var(--border);
        border-radius: 0.65rem;
        padding: 0.45rem;
        background: rgba(0, 0, 0, 0.02);
      }

      .auth-tab-panel {
        background: #ffffff;
        box-shadow: none;
      }

      .header-auth-fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(120px, 1fr));
        gap: 0.35rem;
      }

      .header-auth label {
        display: block;
        margin-bottom: 0.25rem;
        font-size: 0.88rem;
        color: var(--text-muted);
      }

      .header-auth input[type='text'],
      .header-auth input[type='password'] {
        width: 100%;
        font-size: 0.9rem;
        padding: 0.46rem 0.58rem;
      }

      .header-auth-actions {
        margin-top: 0.3rem;
        display: flex;
                gap: 0.3rem;
      }

      .header-auth-status {
        margin-top: 0.3rem;
        font-size: 1rem;
      }

      @media (max-width: 960px) {
        header {
          min-height: 108px;
          padding: 12px 14px 0;
        }

        header::before {
          background-size: 620px auto;
          opacity: 0.14;
        }

        .header-auth-fields {
          grid-template-columns: 1fr;
        }

        .header-tabs {
          position: absolute;
          left: 12px;
          right: 12px;
          bottom: -1px;
          width: auto;
          margin-bottom: 0;
          gap: 0.5rem;
        }

        .header-tab {
          font-size: 1.14rem;
          padding: 0.62rem 1rem;
        }

        .auth-tab-panel {
          position: static;
          width: 100%;
          box-shadow: none;
        }
      }

      .page {
        max-width: 1180px;
        margin: 0 auto;
        padding: 1rem;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 1rem;
      }

      .card {
        padding: 1rem 1.2rem;
      }

      .muted {
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .row {
        display: flex;
        gap: 0.6rem;
        align-items: flex-end;
        flex-wrap: wrap;
      }

      .player-entry-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 110px;
        gap: 0.6rem;
        align-items: end;
      }

      .player-entry-row .primary {
        grid-column: 1 / -1;
        justify-self: start;
      }

      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 0.45rem;
        padding: 0.5rem 0.6rem;
        font-family: inherit;
        font-size: 0.95rem;
        resize: vertical;
        min-height: 120px;
      }

      @media (max-width: 900px) {
        .player-entry-row {
          grid-template-columns: 1fr;
        }
      }

      .pool-list {
        list-style: none;
        padding: 0;
        margin: 0.6rem 0 0 0;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        background: rgba(0, 0, 0, 0.02);
        max-height: 280px;
        overflow-y: auto;
      }

      .pool-list li {
        padding: 0.5rem 0.7rem;
        border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        display: flex;
        align-items: center;
        gap: 0.45rem;
      }

      .pool-list li:last-child {
        border-bottom: none;
      }

      .item-label {
        flex: 1;
        min-width: 0;
      }

      .badge {
        background: var(--primary-soft);
        color: white;
        padding: 0.1rem 0.5rem;
        border-radius: 999px;
        font-size: 0.94rem;
      }

      .actions {
        display: flex;
        gap: 0.25rem;
      }

      .actions button.danger {
        background: #fce7f3;
        border-color: #f9a8d4;
        color: #ec4899;
      }

      .actions button.danger:hover {
        background: #fbcfe8;
      }

      .overview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 0.6rem;
      }

      .stat {
        border: 1px solid var(--border);
        border-radius: 0.6rem;
        background: rgba(0, 0, 0, 0.02);
        padding: 0.6rem;
      }

      .stat-label {
        font-size: 0.98rem;
        color: var(--text-muted);
      }

      .stat-value {
        font-weight: 700;
        font-size: 1.05rem;
      }

      .section-icon {
        width: 1.05rem;
        height: 1.05rem;
        display: inline-flex;
        color: #ec4899;
        flex: 0 0 auto;
        margin-right: 0.35rem;
        vertical-align: text-bottom;
      }

      .section-icon svg {
        width: 100%;
        height: 100%;
        fill: currentColor;
      }

      .section-title-pink {
        color: #ec4899;
      }

      .status-message {
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 0.6rem 0.8rem;
        margin: 0.8rem auto 0;
        max-width: 1180px;
        font-size: 0.85rem;
        display: none;
      }

      .status-message.show {
        display: block;
      }

      .status-message.info {
        background: rgba(22, 163, 74, 0.1);
        border-color: rgba(22, 163, 74, 0.35);
      }

      .status-message.success {
        background: rgba(22, 163, 74, 0.12);
        border-color: rgba(22, 163, 74, 0.35);
      }

      .status-message.error {
        background: rgba(185, 28, 28, 0.12);
        border-color: rgba(185, 28, 28, 0.35);
      }

    </style>
  </head>

  <body>
    <header>
      <nav class="header-tabs" aria-label="Bereich wechseln">
        <a class="header-tab" href="./index.html">Builder</a>
        <a class="header-tab active" href="./pool-manager.html">Verwaltung</a>
                <a class="header-tab" href="./auth.html"><span id="authTabLabel">Anmeldung</span></a>
      </nav>
    </header>

    <div id="statusMessage" class="status-message" aria-live="polite" role="status"></div>

    <main class="page">
      <section class="card">
        <h2>
          <span class="section-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="M10 4a2 2 0 0 1 1.414.586l1 1A2 2 0 0 0 13.828 6H19a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3h5z"
              />
            </svg>
          </span>
          <span class="section-title-pink">Kategorien</span>
        </h2>
        <p class="muted">Kategorien strukturieren deine Pools.</p>

        <div class="row">
          <div style="flex: 1; min-width: 180px">
            <label for="categoryInput">Neue Kategorie</label>
            <input id="categoryInput" type="text" placeholder="z.B. 1A Mädchen" />
          </div>
          <button id="addCategoryBtn" class="primary">+ Kategorie</button>
        </div>

        <ul id="categoryList" class="pool-list"></ul>
      </section>

      <section class="card">
        <h2>
          <span class="section-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="M7 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm10 0a3 3 0 1 1 0-6 3 3 0 0 1 0 6zM2 19a5 5 0 0 1 10 0v1H2v-1zm10 1v-1a6.98 6.98 0 0 0-1.63-4.5A5 5 0 0 1 22 19v1h-10z"
              />
            </svg>
          </span>
          <span class="section-title-pink">Pools</span>
        </h2>
        <p class="muted" id="poolHint">Wähle zuerst eine Kategorie.</p>

        <div class="row">
          <div style="flex: 1; min-width: 180px">
            <label for="poolInput">Neuer Pool</label>
            <input id="poolInput" type="text" placeholder="z.B. Basketball" disabled />
          </div>
          <button id="addPoolBtn" class="primary" disabled>+ Pool</button>
        </div>

        <ul id="poolList" class="pool-list"></ul>
      </section>

      <section class="card">
        <h2>
          <span class="section-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="M12 12a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm-7 8a7 7 0 0 1 14 0v1H5v-1z"
              />
            </svg>
          </span>
          <span class="section-title-pink">Spieler</span>
        </h2>
        <p class="muted" id="playerHint">Wähle zuerst einen Pool.</p>

        <div class="player-entry-row">
          <div style="min-width: 0">
            <label for="playerBulkInput">Spielernamen (eine Zeile pro Name)</label>
            <textarea
              id="playerBulkInput"
              placeholder="Max Mustermann&#10;Anna Beispiel&#10;..."
              disabled
            ></textarea>
          </div>

          <div style="width: 110px">
            <label for="skillSelect">Stärke</label>
            <select id="skillSelect" disabled>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3" selected>3</option>
              <option value="4">4</option>
            </select>
          </div>

          <button id="addPlayersBtn" class="primary" disabled>Namen übernehmen</button>
        </div>

        <ul id="playerList" class="pool-list"></ul>
      </section>

      <section class="card">
        <h2>
          <span class="section-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path
                d="M7 18a4 4 0 1 1 .2-8A6 6 0 0 1 18.8 8a4.2 4.2 0 0 1 .2 8H7zm4.5-7h1v2h2v1h-2v2h-1v-2h-2v-1h2v-2z"
              />
            </svg>
          </span>
          <span class="section-title-pink">Übersicht & Cloud</span>
        </h2>
        <div class="overview-grid">
          <div class="stat">
            <div class="stat-label">Kategorien</div>
            <div class="stat-value" id="statCategories">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Pools</div>
            <div class="stat-value" id="statPools">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">Spieler</div>
            <div class="stat-value" id="statPlayers">0</div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.local.js"></script>
    <script src="./supabase-config.js"></script>
    <script src="./js/pool-manager.js"></script>
    <script src="./js/pool-manager-ui.js"></script>
    <script src="./js/auth-cloud.js"></script>
  </body>
</html>
